<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patient Form</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; display: flex; justify-content: center; padding-top: 40px; }
        .form-box { background: #fff; padding: 30px; border-radius: 8px; width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #1e3c72; text-align: center; }
        input, select { width: 100%; padding: 8px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #1e3c72; color: #fff; border: none; border-radius: 4px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form-box">
        <h2 th:text="${patient.id} != null ? 'Update Patient' : 'Add Patient'"></h2>
        <form th:action="@{/patients/save}" th:object="${patient}" method="post">
            <input type="hidden" th:field="*{id}">
            <input type="text" th:field="*{name}" placeholder="Full Name" required>
            <input type="number" th:field="*{age}" placeholder="Age" required>
            <select th:field="*{gender}" required>
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
            <input type="text" th:field="*{contactNumber}" placeholder="Contact Number" required>
            <input type="text" th:field="*{address}" placeholder="Address">
            <input type="text" th:field="*{medicalHistory}" placeholder="Medical History">
            <button type="submit">Save</button>
        </form>
    </div>
</body>
</html>
