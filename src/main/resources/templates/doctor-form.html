<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Doctor Form</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; display: flex; justify-content: center; padding-top: 40px; }
        .form-box { background: #fff; padding: 30px; border-radius: 8px; width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #1e3c72; text-align: center; }
        input { width: 100%; padding: 8px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #1e3c72; color: #fff; border: none; border-radius: 4px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form-box">
        <h2 th:text="${doctor.id} != null ? 'Update Doctor' : 'Add Doctor'"></h2>
        <form th:action="@{/doctors/save}" th:object="${doctor}" method="post">
            <input type="hidden" th:field="*{id}">
            <input type="text" th:field="*{name}" placeholder="Doctor Name" required>
            <input type="text" th:field="*{specialization}" placeholder="Specialization" required>
            <input type="text" th:field="*{qualification}" placeholder="Qualification">
            <input type="text" th:field="*{contactNumber}" placeholder="Contact Number" required>
            <input type="email" th:field="*{email}" placeholder="Email">
            <input type="text" th:field="*{availableDays}" placeholder="Available Days (e.g. Mon-Fri)">
            <button type="submit">Save</button>
        </form>
    </div>
</body>
</html>
