<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Book Appointment</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; display: flex; justify-content: center; padding-top: 40px; }
        .form-box { background: #fff; padding: 30px; border-radius: 8px; width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #1e3c72; text-align: center; }
        label { font-size: 14px; color: #333; margin-top: 8px; display: block; }
        input, select { width: 100%; padding: 8px; margin: 6px 0 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #1e3c72; color: #fff; border: none; border-radius: 4px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form-box">
        <h2>Book Appointment</h2>
        <form th:action="@{/appointments/save}" th:object="${appointment}" method="post">

            <label>Patient</label>
            <select th:field="*{patient}" required>
                <option value="">Select Patient</option>
                <option th:each="p : ${patients}" th:value="${p.id}" th:text="${p.name}"></option>
            </select>

            <label>Doctor</label>
            <select th:field="*{doctor}" required>
                <option value="">Select Doctor</option>
                <option th:each="d : ${doctors}" th:value="${d.id}" th:text="${d.name} + ' - ' + ${d.specialization}"></option>
            </select>

            <label>Appointment Date</label>
            <input type="date" th:field="*{appointmentDate}" required>

            <label>Appointment Time</label>
            <input type="time" th:field="*{appointmentTime}" required>

            <label>Reason</label>
            <input type="text" th:field="*{reason}" placeholder="Reason for visit">

            <button type="submit">Book Appointment</button>
        </form>
    </div>
</body>
</html>
