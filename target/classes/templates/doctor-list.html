<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Doctor List</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 40px; background: #f4f6f9; }
        h2 { color: #1e3c72; }
        table { width: 100%; border-collapse: collapse; background: #fff; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background: #1e3c72; color: #fff; }
        a.btn { padding: 6px 12px; margin-right: 5px; text-decoration: none; border-radius: 4px; color: #fff; }
        .add-btn { background: #1e3c72; }
        .edit-btn { background: #2a9d8f; }
        .delete-btn { background: #e63946; }
    </style>
</head>
<body>
    <h2>Doctor Management</h2>
    <a th:href="@{/doctors/add}" class="btn add-btn">+ Add Doctor</a>
    <br><br>
    <table>
        <tr>
            <th>ID</th><th>Name</th><th>Specialization</th><th>Qualification</th>
            <th>Contact</th><th>Email</th><th>Available Days</th><th>Actions</th>
        </tr>
        <tr th:each="doctor : ${doctors}">
            <td th:text="${doctor.id}"></td>
            <td th:text="${doctor.name}"></td>
            <td th:text="${doctor.specialization}"></td>
            <td th:text="${doctor.qualification}"></td>
            <td th:text="${doctor.contactNumber}"></td>
            <td th:text="${doctor.email}"></td>
            <td th:text="${doctor.availableDays}"></td>
            <td>
                <a th:href="@{/doctors/edit/{id}(id=${doctor.id})}" class="btn edit-btn">Edit</a>
                <a th:href="@{/doctors/delete/{id}(id=${doctor.id})}" class="btn delete-btn"
                   onclick="return confirm('Are you sure?')">Delete</a>
            </td>
        </tr>
    </table>
</body>
</html>
