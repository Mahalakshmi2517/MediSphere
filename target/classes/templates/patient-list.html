<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patient List</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 40px; background: #f4f6f9; }
        h2 { color: #1e3c72; }
        table { width: 100%; border-collapse: collapse; background: #fff; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background: #1e3c72; color: #fff; }
        a.btn { padding: 6px 12px; margin-right: 5px; text-decoration: none; border-radius: 4px; color: #fff; }
        .add-btn { background: #1e3c72; }
        .edit-btn { background: #2a9d8f; }
        .delete-btn { background: #e63946; }
    </style>
</head>
<body>
    <h2>Patient Management</h2>
    <a th:href="@{/patients/add}" class="btn add-btn">+ Add Patient</a>
    <br><br>
    <table>
        <tr>
            <th>ID</th><th>Name</th><th>Age</th><th>Gender</th>
            <th>Contact</th><th>Address</th><th>Medical History</th><th>Actions</th>
        </tr>
        <tr th:each="patient : ${patients}">
            <td th:text="${patient.id}"></td>
            <td th:text="${patient.name}"></td>
            <td th:text="${patient.age}"></td>
            <td th:text="${patient.gender}"></td>
            <td th:text="${patient.contactNumber}"></td>
            <td th:text="${patient.address}"></td>
            <td th:text="${patient.medicalHistory}"></td>
            <td>
                <a th:href="@{/patients/edit/{id}(id=${patient.id})}" class="btn edit-btn">Edit</a>
                <a th:href="@{/patients/delete/{id}(id=${patient.id})}" class="btn delete-btn"
                   onclick="return confirm('Are you sure?')">Delete</a>
            </td>
        </tr>
    </table>
</body>
</html>
